<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="DICOM Forge — de-identify, QC, and convert medical imaging">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="24" fill="url(#glow)"/>
  <rect width="1200" height="300" rx="24" fill="url(#glow2)"/>
  <text x="600" y="108" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#title)">DICOM Forge</text>
  <text x="600" y="148" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">Strip names from imaging paperwork · run QC · export for 3D Slicer &amp; ITK-SNAP</text>
  <text x="600" y="182" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">ingest → de-identify → QC → convert · audit record on every run</text>
  <rect x="320" y="206" width="560" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="380" y="206" width="440" height="3" rx="1.5" fill="#2dd4bf" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">dacameragirl.github.io/dicom-forge</text>
  <text x="600" y="272" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">PHI redaction is risk reduction — always review output before sharing</text>
</svg>
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release and upload build artifacts
  id-token: write   # OIDC token for PyPI Trusted Publishing (no API token stored)

jobs:
  release:
    runs-on: ubuntu-latest
    # The 'pypi' environment is where the Trusted Publisher is registered on
    # PyPI's side. Configuring it as a pending publisher before the first tag
    # lets this workflow publish without any long-lived secret.
    environment:
      name: pypi
      url: https://pypi.org/p/dicom-anvil
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
      # Publishing to PyPI is intentionally left as a manual/opt-in step.
      # To enable Trusted Publishing, add a pypi environment and uncomment:
      # - uses: pypa/gh-action-pypi-publish@release/v1

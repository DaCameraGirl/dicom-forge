name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,convert]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with conversion extra)
        run: pip install -e ".[dev,convert]"
      - name: Run full test suite
        run: pytest --cov-report=xml
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml

  core-only:
    name: Core install (no native extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core only
        run: pip install -e ".[dev]"
      - name: Prove the core runs without SimpleITK/pynrrd
        run: pytest -m "not requires_convert"

  native:
    name: Native ITK CLI (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ITK + C++ toolchain
        run: |
          sudo apt-get update
          # Ubuntu's ITK is built with the VTK glue module enabled, so
          # find_package(ITK) transitively configures VTK, which calls
          # find_package(MPI) -- hence mpi-default-dev. libgdcm-dev provides
          # GDCM's CMake target files (ITK is built against system GDCM).
          sudo apt-get install -y --no-install-recommends \
            cmake g++ libinsighttoolkit5-dev libgdcm-dev mpi-default-dev
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build dicom-probe
        run: |
          cmake -S native/dicom-probe -B native/dicom-probe/build \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build native/dicom-probe/build --parallel
      - name: Generate a synthetic DICOM series
        run: |
          python -m pip install --quiet pydicom numpy
          python native/dicom-probe/testing/make_series.py "$RUNNER_TEMP/series"
      - name: Probe the series and validate its geometry
        run: |
          native/dicom-probe/build/dicom-probe "$RUNNER_TEMP/series" \
            | tee "$RUNNER_TEMP/probe.json"
          python native/dicom-probe/testing/check_probe.py "$RUNNER_TEMP/probe.json"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

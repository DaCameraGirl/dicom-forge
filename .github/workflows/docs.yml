name: Docs

# Builds the mkdocs-material site and publishes it to GitHub Pages via GitHub
# Actions (Pages "source: GitHub Actions"). Pull requests build the site to
# catch breakage but do not deploy.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs + package (mkdocstrings introspects the package)
        run: pip install -e ".[docs]"
      - name: Build site (strict mode fails on broken refs/nav)
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    # Publish only from main; PRs stop after the build above.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
